apiVersion: v1
kind: Namespace
metadata:
  name: agent-system
  labels:
    name: agent-system

---
apiVersion: v1
kind: Secret
metadata:
  name: agent-secrets
  namespace: agent-system
type: Opaque
stringData:
  OPENAI_API_KEY: ${OPENAI_API_KEY:-changeme}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-server
  namespace: agent-system
  labels:
    app: agent-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-server
  template:
    metadata:
      labels:
        app: agent-server
    spec:
      containers:
        - name: agent-server
          image: minimal-k8s-agent-demo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: OPENAI_API_KEY
            - name: OPENAI_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: OPENAI_BASE_URL
            - name: OPENAI_MODEL
              value: "gpt-4o-mini"
            - name: DEMO_K8S_ENABLED
              value: "false"
            - name: DEMO_WS_AUTH_ENABLED
              value: "false"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: config-volume
              mountPath: /root/.claude
      volumes:
        - name: config-volume
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: agent-server
  namespace: agent-system
  labels:
    app: agent-server
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: agent-server

---

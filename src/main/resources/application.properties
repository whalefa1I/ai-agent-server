# Spring AI 配置 - 阿里云百炼 (OpenAI 兼容)
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.base-url=${OPENAI_BASE_URL:https://coding.dashscope.aliyuncs.com}
spring.ai.openai.chat.options.model=${OPENAI_MODEL:qwen3.5-plus}

# MCP Server 配置
spring.ai.mcp.server.name=ai-agent-mcp-server
spring.ai.mcp.server.version=1.0.0

# 服务器配置
server.port=8080

# 日志配置
logging.level.demo.k8s.agent=DEBUG
logging.level.org.springframework.ai=DEBUG
logging.level.org.springframework.web.client=DEBUG

# Actuator 配置
management.endpoints.web.exposure.include=health,info

# Spring AI 配置 - 阿里云百炼 (OpenAI 兼容)
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.base-url=https://coding.dashscope.aliyuncs.com/v1
spring.ai.openai.chat.options.model=kimi-k2.5-instruct

# MCP Server 配置
spring.ai.mcp.server.name=ai-agent-mcp-server
spring.ai.mcp.server.version=1.0.0

# 服务器配置
server.port=8080

# 日志配置
logging.level.demo.k8s.agent=DEBUG
logging.level.org.springframework.ai=INFO

# Actuator 配置
management.endpoints.web.exposure.include=health,info

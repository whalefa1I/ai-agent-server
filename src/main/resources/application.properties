# Spring AI 配置 - 已移至 OpenAiClientConfig.java
# spring.ai.openai.api-key=sk-sp-ab63f62c8df3494a8763982b1a741081
# spring.ai.openai.base-url=https://coding.dashscope.aliyuncs.com
# spring.ai.openai.chat.options.model=qwen3.5-plus

# MCP Server 配置
spring.ai.mcp.server.name=ai-agent-mcp-server
spring.ai.mcp.server.version=1.0.0

# 服务器配置
server.port=8080

# 日志配置
logging.level.demo.k8s.agent=DEBUG
logging.level.org.springframework.ai=DEBUG
logging.level.org.springframework.web.client=DEBUG

# Actuator 配置
management.endpoints.web.exposure.include=health,info

# 禁用 OpenAI 自动配置
spring.ai.openai.enabled=false

# 允许 Bean 覆盖（用于自定义 OpenAiClientConfig 覆盖自动配置）
spring.main.allow-bean-definition-overriding=true

# Embedding 配置 - 使用阿里云 text-embedding-v3 模型
spring.ai.openai.embedding.api-key=sk-sp-ab63f62c8df3494a8763982b1a741081
spring.ai.openai.embedding.model=text-embedding-v3

# Speech 配置 - 禁用自动配置
spring.ai.openai.speech.enabled=false

spring:
  application:
    name: minimal-k8s-agent-demo
  main:
    # 允许自定义 Bean 覆盖 Spring AI 自动配置
    allow-bean-definition-overriding: true
  # Flyway Configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
  # Database Configuration
  datasource:
    # 开发环境使用 H2，生产环境使用 PostgreSQL (Railway)
    url: ${DATABASE_URL:jdbc:h2:file:${java.io.tmpdir}/agent-data/agent;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console
  # JPA Configuration
  jpa:
    database-platform: ${DATABASE_DIALECT:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update} # 开发环境使用 update，生产环境使用 validate，由 Flyway 管理 DDL
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  # Spring AI 配置 - 使用 Alibaba DashScope (百炼) API
  ai:
    openai:
      api-key: ${DASHSCOPE_API_KEY:sk-sp-ab63f62c8df3494a8763982b1a741081}
      # 仅填协议+主机（不要带 /v1）：Spring AI OpenAiApi 会拼接 /v1/chat/completions、/v1/embeddings
      base-url: ${DASHSCOPE_BASE_URL:https://coding.dashscope.aliyuncs.com}
      chat:
        options:
          model: ${DASHSCOPE_MODEL:qwen3.5-plus}
        api-key: ${DASHSCOPE_API_KEY:sk-sp-ab63f62c8df3494a8763982b1a741081}
      embedding:
        api-key: ${DASHSCOPE_API_KEY:sk-sp-ab63f62c8df3494a8763982b1a741081}
        options:
          model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v3}

# 日志：默认偏安静，避免联调时轮询 + Spring HTTP 调试把 logs 撑爆。
# 需要细查时可加环境变量：LOGGING_LEVEL_DEMO_K8S_AGENT=DEBUG
# 或：LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB=DEBUG
logging:
  level:
    root: INFO
    demo.k8s.agent: INFO
    org.springframework.ai: INFO
    org.springframework.web.client: INFO
    org.springframework.http: INFO
    org.springframework.http.client: INFO
    # 降低 Hibernate 工具 schema 日志级别（避免索引已存在的警告）
    org.hibernate.tool.schema.spi.ExceptionHandlerLoggedImpl: ERROR
    org.hibernate.tool.schema.internal.ExceptionHandlerLoggedImpl: ERROR
  # Grafana Loki 配置
  loki:
    url: ${LOKI_URL:http://localhost:3100/loki/api/v1/push}
    username: ${LOKI_USERNAME:}
    password: ${LOKI_PASSWORD:}
  pattern:
    # 日志格式，包含链路追踪信息
    levelpattern: "%5p [${spring.application.name:-},%X{traceId:-},%X{spanId:-}]"
    datepattern: "yyyy-MM-dd HH:mm:ss.SSS"
    filepattern: "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [${spring.application.name:-},%X{traceId:-},%X{spanId:-}] %m%n"

# 开发环境配置
demo:
  openai:
    connect-timeout-ms: ${DEMO_OPENAI_CONNECT_TIMEOUT_MS:15000}
    read-timeout-ms: ${DEMO_OPENAI_READ_TIMEOUT_MS:180000}
  debug:
    # 为 true 时在每次模型调用前打印工具 inputSchema 摘要、系统提示与各条消息预览（仅服务端日志）
    log-model-request: ${DEMO_DEBUG_LOG_MODEL_REQUEST:false}
    model-request-preview-chars: 500
    model-request-tool-schema-max-chars: 1200
  dev:
    # 开发环境跳过配额检查
    skip-quota-check: true
    # 开发阶段可关闭全部鉴权（仅本地联调使用）
    disable-auth: ${DEMO_DEV_DISABLE_AUTH:true}
  # 记忆系统配置
  memory:
    # 是否启用记忆系统（包括语义搜索和 Embedding）
    enabled: ${DEMO_MEMORY_ENABLED:false}
  coordinator:
    # true 时主会话仅 Task + SendMessage + TaskStop（占位），对齐 Claude Code Coordinator 工具分区思路
    enabled: ${DEMO_COORDINATOR_MODE:false}
  # 外置超长工具结果（context_object 表 + read_context_object）；表由 Flyway 始终创建，读取由开关控制
  context-object:
    enabled: ${DEMO_CONTEXT_OBJECT_ENABLED:false}
    default-tenant-id: ${DEMO_CONTEXT_OBJECT_TENANT_ID:default}
    read-max-chars: ${DEMO_CONTEXT_OBJECT_READ_MAX_CHARS:200000}
    read-max-token-estimate: ${DEMO_CONTEXT_OBJECT_READ_MAX_TOKEN_ESTIMATE:50000}
    # 写入路径配置（M1 实现）
    write-enabled: ${DEMO_CONTEXT_OBJECT_WRITE_ENABLED:false}
    write-threshold-chars: ${DEMO_CONTEXT_OBJECT_WRITE_THRESHOLD_CHARS:10000}
    fallback-head-chars: ${DEMO_CONTEXT_OBJECT_FALLBACK_HEAD_CHARS:2000}
    fallback-tail-chars: ${DEMO_CONTEXT_OBJECT_FALLBACK_TAIL_CHARS:2000}
    default-ttl-hours: ${DEMO_CONTEXT_OBJECT_DEFAULT_TTL_HOURS:24}
  # 多 Agent 子系统配置（M3 实现）
  multi-agent:
    enabled: ${DEMO_MULTI_AGENT_ENABLED:true}
    mode: ${DEMO_MULTI_AGENT_MODE:on}  # off | shadow | on
    max-spawn-depth: ${DEMO_MULTI_AGENT_MAX_SPAWN_DEPTH:3}
    max-concurrent-spawns: ${DEMO_MULTI_AGENT_MAX_CONCURRENT_SPAWNS:5}
    wallclock-ttl-seconds: ${DEMO_MULTI_AGENT_WALLCLOCK_TTL:180}
    default-tenant-id: ${DEMO_MULTI_AGENT_DEFAULT_TENANT_ID:default}
    # 子 Agent Worker 是否注册 TaskCreate/TaskList 等；默认 false，避免子内再嵌 Task
    worker-expose-task-tools: ${DEMO_MULTI_AGENT_WORKER_TASK_TOOLS:false}
  tools:
    # default | read_only | bypass — 与 ToolPermissionContext 对齐；read_only 时仅保留只读类工具（如 Skill）
    permission-mode: ${DEMO_TOOLS_PERMISSION_MODE:bypass}
    # 对齐 CLAUDE_CODE_SIMPLE：为 true 时仅保留 simple-tool-names 中的工具
    simple-mode: ${DEMO_TOOLS_SIMPLE_MODE:false}
    simple-tool-names:
      - Skill
    deny-tool-names: []
    feature:
      agent-swarms: ${DEMO_TOOLS_FEATURE_AGENT_SWARMS:true}
      experimental: ${DEMO_TOOLS_FEATURE_EXPERIMENTAL:false}
    internal-ant-tools: ${DEMO_TOOLS_INTERNAL_ANT:false}
  agent:
    # 可选：Brave Search，供 ClaudeSubagentType 内置子 Agent 使用；不配则不含网页搜索工具
    brave-api-key: ${BRAVE_API_KEY:}
  query:
    # 对齐 query.ts 外层 maxTurns（模型调用轮次上限）
    max-turns: ${DEMO_QUERY_MAX_TURNS:32}
    # Tier 1: microcompact - 单条 tool result 最大字符数
    microcompact-max-chars-per-tool-response: 24000
    # Tier 2: time-based compaction - 空闲阈值（分钟），<=0 表示禁用
    time-based-compaction-gap-minutes: ${DEMO_QUERY_TIME_BASED_GAP:30}
    # Tier 2: time-based compaction - 保留最近工具结果数量
    time-based-compaction-keep-recent: 3
    # Tier 3: autocompact - 总字符阈值
    full-compact-threshold-chars: 120000
    # 跨用户轮次保留的历史窗口（USER/ASSISTANT 消息条数）
    history-window-messages: ${DEMO_QUERY_HISTORY_WINDOW_MESSAGES:16}
    # Tier 3: autocompact - 开关
    full-compact-enabled: ${DEMO_QUERY_FULL_COMPACT:false}
    retry:
      max-attempts: 5
      base-delay-ms: 500
  k8s:
    # 本地联调 LLM 时保持 false；连接集群时改为 true，并配置 kubeconfig（默认 ~/.kube/config）
    enabled: ${DEMO_K8S_ENABLED:false}
    namespace: ${DEMO_K8S_NAMESPACE:default}
    runner-image: ${DEMO_K8S_RUNNER_IMAGE:busybox:1.36}
    ttl-seconds-after-finished: 120
    timeout: 3m
  ws:
    auth:
      enabled: ${DEMO_WS_AUTH_ENABLED:false}
      token-validity-seconds: ${DEMO_WS_AUTH_TOKEN_VALIDITY:86400}
      psk: ${DEMO_WS_AUTH_PSK:}  # 预共享密钥，用于简单部署
  hooks:
    # Hook 系统开关
    enabled: ${DEMO_HOOKS_ENABLED:true}
    # 工作区 Hook 目录（默认 .openclaw/hooks/）
    workspace-dir: ${DEMO_HOOKS_WORKSPACE_DIR:}
    # 允许执行的 Hook 类型列表（空表示允许所有）
    allowed-hooks: []
    # Hook 执行超时时间（毫秒）
    timeout-ms: 5000
    # 是否异步执行 Hook
    async: false
  channels:
    feishu:
      # 飞书频道开关
      enabled: ${DEMO_FEISHU_ENABLED:false}
      # 飞书应用 App ID
      app-id: ${DEMO_FEISHU_APP_ID:}
      # 飞书应用 App Secret
      app-secret: ${DEMO_FEISHU_APP_SECRET:}
      # 飞书验证 Token
      verification-token: ${DEMO_FEISHU_VERIFICATION_TOKEN:}
      # 飞书加密 Key（可选）
      encrypt-key: ${DEMO_FEISHU_ENCRYPT_KEY:}
      # 飞书 API 基础 URL
      api-base-url: ${DEMO_FEISHU_API_BASE_URL:https://open.feishu.cn/open-apis}
  skills:
    # 技能系统开关
    enabled: ${DEMO_SKILLS_ENABLED:true}
    # 热加载配置
    watch:
      # 是否启用文件监听热加载
      enabled: ${DEMO_SKILLS_WATCH_ENABLED:true}
      # 防抖延迟（毫秒）
      debounce-ms: ${DEMO_SKILLS_WATCH_DEBOUNCE_MS:250}
      # 是否忽略 .git 目录
      ignore-git: ${DEMO_SKILLS_WATCH_IGNORE_GIT:true}
      # 是否忽略 node_modules 目录
      ignore-node-modules: ${DEMO_SKILLS_WATCH_IGNORE_NODE_MODULES:true}

# 禁用 actuator 数据库健康检查
management:
  health:
    db:
      enabled: false
    datasource:
      enabled: false

# Python 远程工具执行器配置
remote:
  tools:
    # 是否启用远程工具执行
    enabled: ${REMOTE_TOOLS_ENABLED:false}
    # Python 服务基础 URL
    base-url: ${REMOTE_TOOLS_BASE_URL:}
    # API Key (可选)
    api-key: ${REMOTE_TOOLS_API_KEY:}
    # 超时时间（秒）
    timeout-seconds: ${REMOTE_TOOLS_TIMEOUT:60}

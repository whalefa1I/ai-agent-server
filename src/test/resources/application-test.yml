spring:
  application:
    name: minimal-k8s-agent-demo-test
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

# 测试环境配置
demo:
  coordinator:
    enabled: false
  tools:
    permission-mode: default
    simple-mode: false
  skills:
    enabled: true
    clawhub:
      enabled: true
      base-url: https://clawhub.com
  mcp:
    enabled: true
    servers: []

# 禁用日志输出
logging:
  level:
    root: WARN
    demo.k8s.agent: WARN
